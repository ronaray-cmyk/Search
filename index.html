<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(160deg, #e9defa 0%, #d8c7f0 100%);
      font-family: 'Montserrat', sans-serif;
      text-align: center;
      padding: 50px 20px;
      margin: 0;
      min-height: 100vh;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: 1px;
      margin-bottom: 30px;
      color: #4a3f5e;
    }
    .subtitle {
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 1px;
      color: #7a6f8a;
      margin-bottom: 40px;
      text-transform: uppercase;
    }
    .btn {
      display: block;
      width: 100%;
      max-width: 320px;
      margin: 16px auto;
      padding: 18px;
      background: #ffffff;
      color: #4a3f5e;
      font-family: 'Montserrat', sans-serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.5px;
      border: none;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(150, 120, 200, 0.25);
      cursor: pointer;
    }
    .btn:active {
      background: #f3eefc;
    }
  </style>
</head>
<body>
  <h1>АСТРОПСИХОЛОГИЯ, ТАРО</h1>
  <div class="subtitle">Хочу консультацию:</div>

  <button class="btn" onclick="Telegram.WebApp.openTelegramLink('https://t.me/oh_my_yana?text=Хочу астрологическую консультацию')">
    Астрологический разбор
  </button>

  <button class="btn" onclick="Telegram.WebApp.openTelegramLink('https://t.me/oh_my_yana?text=Хочу расклад')">
    Таро
  </button>
</body>
</html>
